version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    env_file: .env
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
    networks:
      - app-net
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask-app


  flask-app:
    build:
      context: .
    container_name: flask-cont
    restart: always
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - app-net

volumes:
  mysql_data:

networks:
  app-net: 
